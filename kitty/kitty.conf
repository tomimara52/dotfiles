# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_FONTS
font_family      family="Iosevka Term"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

font_size 11.0
text_composition_strategy legacy

background_opacity 0.95

cursor_trail 50
cursor_trail_start_threshold 10

scrollback_pager nvim -u NONE 
    \ -c "set nonumber nolist showtabline=0 foldcolumn=0 clipboard=unnamedplus" 
    \ -c "map q :q<CR>"
    \ -c "autocmd TermOpen * normal G" 
    \ -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - "


tab_title_template "{index}:{title}"
tab_bar_style powerline 

kitty_mod ctrl+shift

map kitty_mod+c new_window
map kitty_mod+x close_window
map kitty_mod+w focus_visible_window
map kitty_mod+m swap_with_window
map kitty_mod+d detach_window ask

map kitty_mod+t new_tab
map kitty_mod+q close_tab
map kitty_mod+r set_tab_title

map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

enabled_layouts tall, fat, horizontal, vertical

map kitty_mod+ñ next_layout

window_border_width 1px 
draw_minimal_borders no
window_margin_width 0

map kitty_mod+p>o kitten hints --type hyperlink
map kitty_mod+p>ctrl+l kitten hints --type line --program -
map kitty_mod+p>ctrl+w kitten hints --type word --program -
map kitty_mod+p>l kitten hints --type line --program @
map kitty_mod+p>w kitten hints --type word --program @

# BEGIN_KITTY_THEME
# Modus Vivendi
include current-theme.conf
# END_KITTY_THEME
